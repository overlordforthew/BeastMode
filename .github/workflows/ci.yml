name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: beastmode_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d beastmode_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ADMIN_API_KEY: ci-admin-key
      ADMIN_USERNAMES: adminalpha
      ALLOW_DEV_RESET_CODES: "true"
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/beastmode_test
      JWT_SECRET: ci-jwt-secret
      NODE_ENV: test
      PORT: 3000
      VAPID_PRIVATE_KEY: vVmFEjGhoaqdatYbuk7ehb9J51j2uilRFeWA64Vyv4g
      VAPID_PUBLIC_KEY: BKH1zJpJp2xAQA6S8KIdaqfp30v5Pi1mXUcOS6Ooyxi-H7-YKHHe9AYkDa31vMBaHPebIlX_1-QoJEL-Jzsm1bE
      VAPID_SUBJECT: mailto:ci@example.com

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run build:web

      - run: npm run test:unit

      - name: Run smoke tests
        run: |
          npm start > /tmp/beastmode-server.log 2>&1 &
          server_pid=$!
          cleanup() {
            status=$?
            kill "$server_pid" 2>/dev/null || true
            if [ "$status" -ne 0 ]; then
              cat /tmp/beastmode-server.log
            fi
            exit "$status"
          }
          trap cleanup EXIT
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/api/health >/dev/null; then
              npm run test:smoke
              exit 0
            fi
            sleep 1
          done
          echo "Server did not become healthy"
          exit 1
